name: Test witness-run action

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for Sigstore OIDC signing
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Run echo under witness (sigstore disabled — works offline/locally)
        id: witness-local
        uses: ./.github/actions/witness-run
        with:
          step: test-local
          command: echo "hello from witness"
          enable-archivista: "false"
          enable-sigstore: "false"

      - name: Show git_oid output
        run: echo "git_oid=${{ steps.witness-local.outputs.git_oid }}"

      - name: Run echo under witness (sigstore enabled — requires id-token permission)
        id: witness-sigstore
        uses: ./.github/actions/witness-run
        with:
          step: test-sigstore
          command: echo "hello with sigstore"
          enable-archivista: "false"
          enable-sigstore: "true"

      - name: Show git_oid output
        run: echo "git_oid=${{ steps.witness-sigstore.outputs.git_oid }}"
