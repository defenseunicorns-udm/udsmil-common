name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: UDS CLI Setup
        uses: ./.github/actions/uds-cli-setup

      - name: Witness Run Lint
        uses: ./.github/actions/witness-run
        with:
          step: lint
          enable-archivista: false
          enable-sigstore: true
          command: uds run lint
          outfile: lint-witness.json

      - name: Upload lint artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lint-artifacts
          path: lint-witness.json

  test-tasks:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: UDS CLI Setup
        uses: ./.github/actions/uds-cli-setup

      - name: Run task integration tests
        run: uds run test

  scan-and-vouch:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: UDS CLI Setup
        uses: ./.github/actions/uds-cli-setup

      - name: OLM CLI Setup
        uses: ./.github/actions/olm-cli-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download lint artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: lint-artifacts
          path: .

      - name: Security Scan
        run: |
          uds run scan:security \
            --with enable_sigstore=true \
            --with enable_archivista=false \
            --with opengrep_scan_path=src/

      - name: Vouch
        uses: ./.github/actions/vouch
        with:
          attestations: gitleaks-witness.json,opengrep-witness.json,lint-witness.json
          sarif-files: gitleaks.sarif.json,opengrep.sarif.json
          olm-catalog: ${{ secrets.OLM_CATALOG }}
          olm-org: ${{ secrets.OLM_ORG }}
          olm-user-id: ${{ secrets.OLM_USER_ID }}
          olm-password: ${{ secrets.OLM_PASSWORD }}
  publish:
    needs: scan-and-vouch
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: UDS CLI Setup
        uses: ./.github/actions/uds-cli-setup

      - name: Publish
        uses: ./.github/actions/publish
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          registry-org: ${{ secrets.REGISTRY_ORG }}
          registry-user-id: ${{ secrets.REGISTRY_USER_ID }}
          registry-password: ${{ secrets.REGISTRY_PASSWORD }}
