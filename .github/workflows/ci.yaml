name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:

      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: UDS CLI Setup
        uses: ./.github/actions/uds-cli-setup

      - name: Cache witness binary
        # actions/cache v5.0.5
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .bin/witness
          key: witness-0.9.2-${{ runner.os }}-${{ runner.arch }}

      - name: Setup witness
        run: test -f .bin/witness || scripts/setup-witness.sh
        shell: bash
        env:
          WITNESS_VERSION: 0.9.2

      - name: Lint with attestation
        run: uds run ci:lint
        shell: bash
        env:
          WITNESS_ENABLE_SIGSTORE: "true"

      - name: Upload lint artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: lint-artifacts
          path: lint-witness.json

  scan-and-vouch:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:

      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: UDS CLI Setup
        uses: ./.github/actions/uds-cli-setup

      - name: Download lint artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: lint-artifacts
          path: .

      - name: Setup tools
        run: uds run setup
        shell: bash
        env:
          WITNESS_VERSION: 0.9.2

      - name: Scan with attestation
        run: uds run ci:scan --set path=src/
        shell: bash
        env:
          WITNESS_ENABLE_SIGSTORE: "true"

      - name: Build with attestation
        run: uds run ci:build
        shell: bash
        env:
          WITNESS_ENABLE_SIGSTORE: "true"

      - name: Setup OLM CLI
        uses: ./.github/actions/olm-cli-setup
        with:
          username: ${{ secrets.OLM_USER_ID }}
          password: ${{ secrets.OLM_PASSWORD }}

      - name: Vouch
        run: uds run vouch
        shell: bash
        env:
          OLM_CATALOG: ${{ secrets.OLM_CATALOG }}
          OLM_ORG: ${{ secrets.OLM_ORG }}
          OLM_USER_ID: ${{ secrets.OLM_USER_ID }}
          OLM_PASSWORD: ${{ secrets.OLM_PASSWORD }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: zarf-package
          path: zarf-package-*.tar.zst

  publish:
    needs: scan-and-vouch
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:

      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: UDS CLI Setup
        uses: ./.github/actions/uds-cli-setup

      - name: Download package artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: zarf-package
          path: .

      - name: Publish
        run: uds run publish
        shell: bash
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          REGISTRY_ORG: ${{ secrets.REGISTRY_ORG }}
          REGISTRY_USER_ID: ${{ secrets.REGISTRY_USER_ID }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
