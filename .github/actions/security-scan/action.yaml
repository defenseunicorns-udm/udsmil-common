name: Security Scan
description: Runs Gitleaks secrets scanning and optionally OpenGrep SAST. Outputs witness JSON and SARIF file lists for passing to the vouch action.

inputs:
  run-opengrep:
    description: Whether to run OpenGrep SAST scanning. Set to 'false' to skip entirely, e.g. when using a different SAST tool and passing its output via external attestations.
    required: false
    default: true
  opengrep-version:
    description: Version of OpenGrep to install
    required: false
    # renovate: datasource=github-releases depName=opengrep/opengrep
    default: v1.15.1
  opengrep-scan-path:
    description: Path to scan with OpenGrep. Useful in monorepos to scope SAST to a specific service directory (e.g. 'services/api').
    required: false
    default: .
  gitleaks-version:
    description: Version of Gitleaks to install
    required: false
    # renovate: datasource=github-releases depName=gitleaks/gitleaks extractVersion=^v(?<version>.+)$
    default: 8.30.1

outputs:
  witness-files:
    description: Comma-separated list of witness JSON attestation files produced by this action
    value: ${{ steps.collect-outputs.outputs.witness-files }}
  sarif-files:
    description: Comma-separated list of SARIF files produced by this action
    value: ${{ steps.collect-outputs.outputs.sarif-files }}

runs:
  using: composite
  steps:

    - name: Install Cosign
      uses: sigstore/cosign-installer@v4.1.1

    - name: Install OpenGrep
      if: ${{ inputs.run-opengrep == 'true' }}
      shell: bash
      run: |
        curl -fSL -o opengrep https://github.com/opengrep/opengrep/releases/download/${{ inputs.opengrep-version }}/opengrep_manylinux_x86
        chmod +x opengrep
        mkdir -p $HOME/.local/bin
        mv opengrep $HOME/.local/bin
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install Gitleaks
      shell: bash
      run: |
        curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v${{ inputs.gitleaks-version }}/gitleaks_${{ inputs.gitleaks-version }}_linux_x64.tar.gz -o gitleaks.tar.gz
        tar -zxf gitleaks.tar.gz
        mkdir -p $HOME/.local/bin
        mv gitleaks $HOME/.local/bin
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        rm gitleaks.tar.gz

    - name: Witness Run OpenGrep
      if: ${{ inputs.run-opengrep == 'true' }}
      uses: testifysec/witness-run-action@7aa15e327829f1f2a523365c564c948d5dde69dd # v0.3.3
      with:
        step: opengrep
        enable-archivista: false
        enable-sigstore: true
        command: opengrep scan ${{ inputs.opengrep-scan-path }} --sarif --sarif-output opengrep.sarif.json
        outfile: opengrep-witness.json
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    - name: Witness Run Gitleaks
      uses: testifysec/witness-run-action@7aa15e327829f1f2a523365c564c948d5dde69dd # v0.3.3
      with:
        step: gitleaks
        enable-archivista: false
        enable-sigstore: true
        command: gitleaks dir . --report-format sarif --report-path gitleaks.sarif.json
        outfile: gitleaks-witness.json
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    - name: Collect outputs
      id: collect-outputs
      shell: bash
      run: |
        WITNESS_FILES="gitleaks-witness.json"
        SARIF_FILES="gitleaks.sarif.json"

        if [[ "${{ inputs.run-opengrep }}" == "true" ]]; then
          WITNESS_FILES="${WITNESS_FILES},opengrep-witness.json"
          SARIF_FILES="${SARIF_FILES},opengrep.sarif.json"
        fi

        echo "witness-files=${WITNESS_FILES}" >> "$GITHUB_OUTPUT"
        echo "sarif-files=${SARIF_FILES}" >> "$GITHUB_OUTPUT"
