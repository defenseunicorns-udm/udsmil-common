name: Security Scan
description: Runs Gitleaks secrets scanning and optionally OpenGrep SAST. Outputs witness JSON and SARIF file lists for passing to the vouch action.

inputs:
  run-opengrep:
    description: Whether to run OpenGrep SAST scanning. Set to 'false' to skip entirely, e.g. when using a different SAST tool and passing its output via external attestations.
    required: false
    default: "true"
  opengrep-version:
    description: Version of OpenGrep to install
    required: false
    # renovate: datasource=github-releases depName=opengrep/opengrep
    default: v1.20.0
  opengrep-scan-path:
    description: Path to scan with OpenGrep. Useful in monorepos to scope SAST to a specific service directory (e.g. 'services/api').
    required: false
    default: .
  gitleaks-version:
    description: Version of Gitleaks to install
    required: false
    # renovate: datasource=github-releases depName=gitleaks/gitleaks extractVersion=^v(?<version>.+)$
    default: 8.30.1

outputs:
  witness-files:
    description: Comma-separated list of witness JSON attestation files produced by this action
    value: ${{ steps.collect-outputs.outputs.witness-files }}
  sarif-files:
    description: Comma-separated list of SARIF files produced by this action
    value: ${{ steps.collect-outputs.outputs.sarif-files }}

runs:
  using: composite
  steps:
    - name: Ensure Gitleaks config is present
      shell: bash
      run: |
        if [ ! -f .gitleaks.toml ]; then
          cp "${{ github.action_path }}/.gitleaks.toml" .gitleaks.toml
          echo "COPIED_GITLEAKS=true" >> $GITHUB_ENV
        fi

    - name: Security Scan
      shell: bash
      run: |
        set -euo pipefail
        # Navigate to the udm-common repo root so tasks.yaml is discoverable.
        # github.action_path points to .github/actions/security-scan inside the
        # udm-common checkout (temp dir on external runners, workspace on internal).
        UDM_ROOT="$(realpath "${{ github.action_path }}/../../..")"

        # Copy gitleaks config into the udm-common root so gitleaks finds it
        # in CWD when the tasks run from there.
        cp "${{ github.action_path }}/.gitleaks.toml" "$UDM_ROOT/.gitleaks.toml"

        (cd "$UDM_ROOT" && uds run scan:security \
          --with enable_sigstore=true \
          --with enable_archivista=false \
          --with run_opengrep="${{ inputs.run-opengrep }}" \
          --with gitleaks_scan_path="$GITHUB_WORKSPACE" \
          --with opengrep_scan_path="$GITHUB_WORKSPACE/${{ inputs.opengrep-scan-path }}" \
          --with gitleaks_version="${{ inputs.gitleaks-version }}" \
          --with opengrep_version="${{ inputs.opengrep-version }}")

        # Move attestation and SARIF output files from the udm-common working
        # directory back to the calling repo's workspace.
        mv "$UDM_ROOT/gitleaks-witness.json" "$GITHUB_WORKSPACE/"
        mv "$UDM_ROOT/gitleaks.sarif.json" "$GITHUB_WORKSPACE/"
        if [[ "${{ inputs.run-opengrep }}" == "true" ]]; then
          mv "$UDM_ROOT/opengrep-witness.json" "$GITHUB_WORKSPACE/" 2>/dev/null || true
          mv "$UDM_ROOT/opengrep.sarif.json" "$GITHUB_WORKSPACE/" 2>/dev/null || true
        fi

    - name: Collect outputs
      id: collect-outputs
      shell: bash
      run: |
        WITNESS_FILES="gitleaks-witness.json"
        SARIF_FILES="gitleaks.sarif.json"

        if [[ "${{ inputs.run-opengrep }}" == "true" ]]; then
          WITNESS_FILES="${WITNESS_FILES},opengrep-witness.json"
          SARIF_FILES="${SARIF_FILES},opengrep.sarif.json"
        fi

        echo "witness-files=${WITNESS_FILES}" >> "$GITHUB_OUTPUT"
        echo "sarif-files=${SARIF_FILES}" >> "$GITHUB_OUTPUT"
