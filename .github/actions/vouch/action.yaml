name: Vouch
description: Builds a Zarf package with Witness attestation and vouches for it via OLM.

inputs:
  attestations:
    description: Comma-separated list of witness JSON attestation files to include (e.g. outputs from security-scan plus any external lint/test attestations)
    required: false
    default: ""
  sarif-files:
    description: Comma-separated list of SARIF files to include as evidence (e.g. outputs from security-scan plus any external SARIF files)
    required: false
    default: ""
  github-token:
    description: GitHub token for OLM CLI installation from GHCR. Recommended in CI to avoid rate limits (pass secrets.GITHUB_TOKEN). Optional for local use.
    required: false
    default: ""
  olm-catalog:
    description: OLM catalog hostname
    required: true
  olm-org:
    description: OLM organization name
    required: true
  zarf-architecture:
    description: Target architecture for the Zarf package
    required: false
    default: amd64
  zarf-flavor:
    description: Flavor for the Zarf package build
    required: false
    default: upstream
  zarf-path:
    description: Path to the directory containing zarf.yaml. Use a subdirectory path for monorepos (e.g. 'services/api').
    required: false
    default: .
  artifact-name:
    description: Name for the uploaded Zarf package artifact. Use unique names when building multiple packages in a matrix.
    required: false
    default: zarf-package
  test-directory:
    description: Path to the test directory to pass to olm vouch. Leave empty to skip the --test-directory flag entirely.
    required: false
    default: tests

outputs:
  zarf-package:
    description: Filename of the built Zarf package
    value: ${{ steps.find-package.outputs.zarf-package }}

runs:
  using: composite
  steps:

    - name: Install Cosign
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Vouch
      shell: bash
      run: |
        set -euo pipefail
        # Navigate to the udm-common repo root so tasks.yaml is discoverable.
        UDM_ROOT="$(realpath "${{ github.action_path }}/../../..")"

        ZARF_PATH="${GITHUB_WORKSPACE}"
        if [[ "${{ inputs.zarf-path }}" != "." ]]; then
          ZARF_PATH="${GITHUB_WORKSPACE}/${{ inputs.zarf-path }}"
        fi

        TEST_DIR=""
        if [[ -n "${{ inputs.test-directory }}" ]]; then
          TEST_DIR="${GITHUB_WORKSPACE}/${{ inputs.test-directory }}"
        fi

        (cd "$UDM_ROOT" && uds run vouch:package \
          --with enable_sigstore=true \
          --with enable_archivista=false \
          --with github_token="${{ inputs.github-token }}" \
          --with olm_cat="${{ inputs.olm-cat }}" \
          --with olm_org="${{ inputs.olm-org }}" \
          --with attestations="${{ inputs.attestations }}" \
          --with sarif_files="${{ inputs.sarif-files }}" \
          --with test_directory="$TEST_DIR" \
          --with witness_workingdir="$GITHUB_WORKSPACE" \
          --with zarf_path="$ZARF_PATH" \
          --with architecture="${{ inputs.zarf-architecture }}" \
          --with flavor="${{ inputs.zarf-flavor }}")

        mv "$UDM_ROOT"/zarf-package-*.tar.zst "$GITHUB_WORKSPACE/"
        mv "$UDM_ROOT/zarf-create-witness.json" "$GITHUB_WORKSPACE/"

    - name: Find Zarf package
      id: find-package
      shell: bash
      run: |
        PACKAGE=$(ls zarf-package-*.tar.zst | head -n 1)
        echo "zarf-package=${PACKAGE}" >> "$GITHUB_OUTPUT"

    - name: Upload Zarf package artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: zarf-package-*.tar.zst
