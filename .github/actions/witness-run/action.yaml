name: Witness Run
description: Run a command with Witness attestation

inputs:
  witness-install-dir:
    description: Directory to install witness in. The directory will be created if it does not exist.
    required: false
  archivista-server:
    description: URL of the Archivista server to store or retrieve attestations
    required: false
    default: https://archivista.testifysec.io
  archivista-headers:
    description: Headers to include when making requests to Archivista. Newline-separated.
    required: false
    default: ""
  attestations:
    description: Space-separated list of attestations to record
    required: false
    default: environment git github
  attestor-link-export:
    description: Export the attestor link predicate in its own attestation
    required: false
    default: "false"
  attestor-maven-pom-path:
    description: Path to the Maven POM file
    required: false
  attestor-sbom-export:
    description: Export the SBOM predicate in its own attestation
    required: false
    default: "false"
  attestor-slsa-export:
    description: Export the SLSA predicate in its own attestation
    required: false
    default: "false"
  certificate:
    description: Path to the signing key certificate
    required: false
  command:
    description: Command to run under witness attestation
    required: true
  enable-archivista:
    description: Use Archivista to store or retrieve attestations
    required: false
    default: "true"
  enable-sigstore:
    description: Use Sigstore for attestation signing
    required: false
    default: "true"
  fulcio:
    description: Fulcio address to sign with
    required: false
  fulcio-oidc-client-id:
    description: OIDC client ID to use for Fulcio authentication
    required: false
  fulcio-oidc-issuer:
    description: OIDC issuer to use for Fulcio authentication
    required: false
  fulcio-token:
    description: Raw token to use for Fulcio authentication
    required: false
  intermediates:
    description: Space-separated intermediate certificates that link trust back to a root of trust in the policy
    required: false
  key:
    description: Path to the signing key
    required: false
  outfile:
    description: File to write signed attestation data to. Defaults to a temp file named after the step.
    required: false
  product-exclude-glob:
    description: Pattern for files to exclude as subjects on the attestation
    required: false
  product-include-glob:
    description: Pattern for files to include as subjects on the attestation
    required: false
  spiffe-socket:
    description: Path to the SPIFFE Workload API socket
    required: false
  step:
    description: Name of the step being attested
    required: true
  timestamp-servers:
    description: Space-separated Timestamp Authority server URLs to use when signing
    required: false
  trace:
    description: Enable tracing for the command
    required: false
    default: "false"
  cosign-certificate-identity:
    description: >
      Expected Sigstore certificate identity URI for the witness release signing workflow.
      Defaults to the official in-toto/witness release workflow URI for the configured version.
    required: false
    default: ""
  cosign-certificate-oidc-issuer:
    description: Expected OIDC issuer for the witness release signing certificate.
    required: false
    default: https://token.actions.githubusercontent.com
  version:
    description: Version of the Witness CLI to install (MAJOR.MINOR.PATCH, no v prefix)
    required: false
    default: 0.9.2
  workingdir:
    description: Directory from which the attested command will run (relative to GITHUB_WORKSPACE)
    required: false
    default: ""

outputs:
  git_oid:
    description: >
      Comma-separated list of GitOIDs stored in Archivista for this step's attestation.
      In the common case of a single attestation this is a single 64-character hex string.
    value: ${{ steps.run-witness.outputs.git_oid }}

runs:
  using: composite
  steps:
    - name: Install cosign
      # sigstore/cosign-installer v4.1.1
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003

    - name: Restore witness cache
      id: cache
      # actions/cache v5.0.5
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
      with:
        path: ${{ inputs.witness-install-dir || runner.temp }}/witness-bin
        key: witness-${{ inputs.version }}-${{ runner.os }}-${{ runner.arch }}

    - name: Download and verify witness
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        WITNESS_VERSION: ${{ inputs.version }}
        WITNESS_CACHE_DIR: ${{ inputs.witness-install-dir || runner.temp }}/witness-bin
        WITNESS_CERT_IDENTITY: ${{ inputs.cosign-certificate-identity }}
        WITNESS_CERT_OIDC_ISSUER: ${{ inputs.cosign-certificate-oidc-issuer }}
      run: ${{ github.action_path }}/scripts/download-verify.sh

    - name: Verify cached witness integrity
      if: steps.cache.outputs.cache-hit == 'true'
      shell: bash
      env:
        WITNESS_CACHE_DIR: ${{ inputs.witness-install-dir || runner.temp }}/witness-bin
      run: ${{ github.action_path }}/scripts/verify-cache.sh

    - name: Run witness
      id: run-witness
      shell: bash
      env:
        WITNESS_VERSION: ${{ inputs.version }}
        WITNESS_CACHE_DIR: ${{ inputs.witness-install-dir || runner.temp }}/witness-bin
        WITNESS_COMMAND: ${{ inputs.command }}
        WITNESS_STEP: ${{ inputs.step }}
        WITNESS_WORKINGDIR: ${{ inputs.workingdir }}
        WITNESS_OUTFILE: ${{ inputs.outfile }}
        WITNESS_ATTESTATIONS: ${{ inputs.attestations }}
        WITNESS_ENABLE_ARCHIVISTA: ${{ inputs.enable-archivista }}
        WITNESS_ARCHIVISTA_SERVER: ${{ inputs.archivista-server }}
        WITNESS_ARCHIVISTA_HEADERS: ${{ inputs.archivista-headers }}
        WITNESS_CERTIFICATE: ${{ inputs.certificate }}
        WITNESS_ENABLE_SIGSTORE: ${{ inputs.enable-sigstore }}
        WITNESS_FULCIO: ${{ inputs.fulcio }}
        WITNESS_FULCIO_OIDC_CLIENT_ID: ${{ inputs.fulcio-oidc-client-id }}
        WITNESS_FULCIO_OIDC_ISSUER: ${{ inputs.fulcio-oidc-issuer }}
        WITNESS_FULCIO_TOKEN: ${{ inputs.fulcio-token }}
        WITNESS_INTERMEDIATES: ${{ inputs.intermediates }}
        WITNESS_KEY: ${{ inputs.key }}
        WITNESS_PRODUCT_EXCLUDE_GLOB: ${{ inputs.product-exclude-glob }}
        WITNESS_PRODUCT_INCLUDE_GLOB: ${{ inputs.product-include-glob }}
        WITNESS_SPIFFE_SOCKET: ${{ inputs.spiffe-socket }}
        WITNESS_TIMESTAMP_SERVERS: ${{ inputs.timestamp-servers }}
        WITNESS_TRACE: ${{ inputs.trace }}
        WITNESS_EXPORT_LINK: ${{ inputs.attestor-link-export }}
        WITNESS_EXPORT_SBOM: ${{ inputs.attestor-sbom-export }}
        WITNESS_EXPORT_SLSA: ${{ inputs.attestor-slsa-export }}
        WITNESS_MAVEN_POM: ${{ inputs.attestor-maven-pom-path }}
      run: ${{ github.action_path }}/scripts/run.sh
