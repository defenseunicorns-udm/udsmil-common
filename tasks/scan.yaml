# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/maru-runner/refs/heads/main/tasks.schema.json

tasks:

  - name: install-gitleaks
    description: Download and install Gitleaks to $HOME/.local/bin
    inputs:
      version:
        description: Gitleaks version to install (no v prefix)
        # renovate: datasource=github-releases depName=gitleaks/gitleaks extractVersion=^v(?<version>.+)$
        default: 8.30.1
    actions:
      - description: Install Gitleaks
        shell:
          linux: bash
          darwin: bash
        cmd: |
          VERSION=${{ .inputs.version }}
          # shellcheck source=scripts/install.sh
          source scripts/install.sh
          OS="$(get_os)"
          ARCH_RAW="$(get_arch)"
          case "$ARCH_RAW" in
            amd64) ARCH="x64" ;;
            arm64) ARCH="arm64" ;;
          esac
          install_from_tarball gitleaks \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_${OS}_${ARCH}.tar.gz" \
            gitleaks

  - name: install-opengrep
    description: Download and install OpenGrep to $HOME/.local/bin (Linux x86_64 only)
    inputs:
      version:
        description: OpenGrep version to install
        # renovate: datasource=github-releases depName=opengrep/opengrep
        default: v1.19.0
    actions:
      - description: Install OpenGrep
        shell:
          linux: bash
          darwin: bash
        cmd: |
          # shellcheck source=scripts/install.sh
          source scripts/install.sh
          OS="$(get_os)"
          ARCH="$(get_arch)"
          if [ "$OS" != "linux" ] || [ "$ARCH" != "amd64" ]; then
            echo "OpenGrep is only available for Linux x86_64; skipping on ${OS}/${ARCH}"
            exit 0
          fi
          VERSION=${{ .inputs.version }}
          install_binary opengrep \
            "https://github.com/opengrep/opengrep/releases/download/${VERSION}/opengrep_manylinux_x86"

  - name: gitleaks
    description: Run Gitleaks secrets scan, optionally wrapped with Witness attestation
    inputs:
      gitleaks_version:
        description: Gitleaks version to install (no v prefix)
        # renovate: datasource=github-releases depName=gitleaks/gitleaks extractVersion=^v(?<version>.+)$
        default: 8.30.1
      witness_version:
        description: Witness version (MAJOR.MINOR.PATCH, no v prefix)
        # renovate: datasource=github-releases depName=in-toto/witness extractVersion=^v(?<version>.+)$
        default: 0.9.2
      enable_witness:
        description: Wrap the scan with Witness attestation. Set to 'false' for local runs without a signer.
        default: "true"
      enable_sigstore:
        description: Sign the attestation with Sigstore/Fulcio. Requires OIDC token (e.g. GitHub Actions).
        default: "false"
      enable_archivista:
        description: Upload the attestation to Archivista.
        default: "false"
    actions:
      - description: Install tools and run Gitleaks scan
        shell:
          linux: bash
          darwin: bash
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          uds run scan:install-gitleaks --with version=${{ .inputs.gitleaks_version }}

          if [ "${{ .inputs.enable_witness }}" = "true" ]; then
            uds run setup:witness --with version=${{ .inputs.witness_version }}
            WITNESS_ARGS=(-a=environment -a=git)
            if [ "${{ .inputs.enable_sigstore }}" = "true" ]; then
              WITNESS_ARGS+=(
                --signer-fulcio-url=https://fulcio.sigstore.dev
                --signer-fulcio-oidc-client-id=sigstore
                --signer-fulcio-oidc-issuer=https://oauth2.sigstore.dev/auth
                --timestamp-servers=https://timestamp.sigstore.dev/api/v1/timestamp
              )
            fi
            WITNESS_ARGS+=(--enable-archivista=${{ .inputs.enable_archivista }})
            witness run "${WITNESS_ARGS[@]}" -s=gitleaks --outfile=gitleaks-witness.json -- \
              gitleaks dir . --report-format sarif --report-path gitleaks.sarif.json
          else
            gitleaks dir . --report-format sarif --report-path gitleaks.sarif.json
          fi

  - name: opengrep
    description: Run OpenGrep SAST scan, optionally wrapped with Witness attestation (Linux x86_64 only)
    inputs:
      opengrep_version:
        description: OpenGrep version to install
        # renovate: datasource=github-releases depName=opengrep/opengrep
        default: v1.19.0
      opengrep_scan_path:
        description: Path to scan with OpenGrep
        default: .
      witness_version:
        description: Witness version (MAJOR.MINOR.PATCH, no v prefix)
        # renovate: datasource=github-releases depName=in-toto/witness extractVersion=^v(?<version>.+)$
        default: 0.9.2
      enable_witness:
        description: Wrap the scan with Witness attestation. Set to 'false' for local runs without a signer.
        default: "true"
      enable_sigstore:
        description: Sign the attestation with Sigstore/Fulcio. Requires OIDC token (e.g. GitHub Actions).
        default: "false"
      enable_archivista:
        description: Upload the attestation to Archivista.
        default: "false"
    actions:
      - description: Install tools and run OpenGrep scan
        shell:
          linux: bash
          darwin: bash
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          OS="$(uname -s)"
          ARCH="$(uname -m)"
          if [ "$OS" != "Linux" ] || [ "$ARCH" != "x86_64" ]; then
            echo "OpenGrep is only available for Linux x86_64; skipping on ${OS}/${ARCH}"
            exit 0
          fi

          OPENGREP_SCAN_PATH=${{ .inputs.opengrep_scan_path }}

          uds run scan:install-opengrep --with version=${{ .inputs.opengrep_version }}

          if [ "${{ .inputs.enable_witness }}" = "true" ]; then
            uds run setup:witness --with version=${{ .inputs.witness_version }}
            WITNESS_ARGS=(-a=environment -a=git)
            if [ "${{ .inputs.enable_sigstore }}" = "true" ]; then
              WITNESS_ARGS+=(
                --signer-fulcio-url=https://fulcio.sigstore.dev
                --signer-fulcio-oidc-client-id=sigstore
                --signer-fulcio-oidc-issuer=https://oauth2.sigstore.dev/auth
                --timestamp-servers=https://timestamp.sigstore.dev/api/v1/timestamp
              )
            fi
            WITNESS_ARGS+=(--enable-archivista=${{ .inputs.enable_archivista }})
            witness run "${WITNESS_ARGS[@]}" -s=opengrep --outfile=opengrep-witness.json -- \
              opengrep scan "$OPENGREP_SCAN_PATH" --sarif --sarif-output opengrep.sarif.json
          else
            opengrep scan "$OPENGREP_SCAN_PATH" --sarif --sarif-output opengrep.sarif.json
          fi

  - name: security
    description: Run Gitleaks and OpenGrep security scans, optionally wrapped with Witness attestation
    inputs:
      gitleaks_version:
        description: Gitleaks version to install (no v prefix)
        # renovate: datasource=github-releases depName=gitleaks/gitleaks extractVersion=^v(?<version>.+)$
        default: 8.30.1
      opengrep_version:
        description: OpenGrep version to install
        # renovate: datasource=github-releases depName=opengrep/opengrep
        default: v1.19.0
      opengrep_scan_path:
        description: Path to scan with OpenGrep
        default: .
      witness_version:
        description: Witness version (MAJOR.MINOR.PATCH, no v prefix)
        # renovate: datasource=github-releases depName=in-toto/witness extractVersion=^v(?<version>.+)$
        default: 0.9.2
      enable_witness:
        description: Wrap scans with Witness attestation. Set to 'false' for local runs without a signer.
        default: "true"
      enable_sigstore:
        description: Sign attestations with Sigstore/Fulcio. Requires OIDC token (e.g. GitHub Actions).
        default: "false"
      enable_archivista:
        description: Upload attestations to Archivista.
        default: "false"
      run_opengrep:
        description: Whether to run OpenGrep SAST. Set to 'false' to skip, e.g. when using a different SAST tool.
        default: "true"
    actions:
      - description: Run Gitleaks and optionally OpenGrep
        shell:
          linux: bash
          darwin: bash
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          GITLEAKS_VERSION=${{ .inputs.gitleaks_version }}
          OPENGREP_VERSION=${{ .inputs.opengrep_version }}
          OPENGREP_SCAN_PATH=${{ .inputs.opengrep_scan_path }}
          WITNESS_VERSION=${{ .inputs.witness_version }}
          ENABLE_WITNESS=${{ .inputs.enable_witness }}
          ENABLE_SIGSTORE=${{ .inputs.enable_sigstore }}
          ENABLE_ARCHIVISTA=${{ .inputs.enable_archivista }}
          RUN_OPENGREP=${{ .inputs.run_opengrep }}

          uds run scan:gitleaks \
            --with gitleaks_version="$GITLEAKS_VERSION" \
            --with witness_version="$WITNESS_VERSION" \
            --with enable_witness="$ENABLE_WITNESS" \
            --with enable_sigstore="$ENABLE_SIGSTORE" \
            --with enable_archivista="$ENABLE_ARCHIVISTA"

          if [ "$RUN_OPENGREP" = "true" ]; then
            uds run scan:opengrep \
              --with opengrep_version="$OPENGREP_VERSION" \
              --with opengrep_scan_path="$OPENGREP_SCAN_PATH" \
              --with witness_version="$WITNESS_VERSION" \
              --with enable_witness="$ENABLE_WITNESS" \
              --with enable_sigstore="$ENABLE_SIGSTORE" \
              --with enable_archivista="$ENABLE_ARCHIVISTA"
          fi

          echo "==> Security scan complete"
          SARIF_FILES="gitleaks.sarif.json"
          if [ "$RUN_OPENGREP" = "true" ]; then
            SARIF_FILES="${SARIF_FILES},opengrep.sarif.json"
          fi
          if [ "$ENABLE_WITNESS" = "true" ]; then
            WITNESS_FILES="gitleaks-witness.json"
            if [ "$RUN_OPENGREP" = "true" ]; then
              WITNESS_FILES="${WITNESS_FILES},opengrep-witness.json"
            fi
            echo "Witness attestation files: ${WITNESS_FILES}"
          fi
          echo "SARIF files: ${SARIF_FILES}"
