# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/maru-runner/refs/heads/main/tasks.schema.json

tasks:

  - name: package
    description: Build a Zarf package with Witness attestation and vouch for it via OLM
    inputs:
      attestations:
        description: Comma-separated list of additional witness JSON attestation files to include
        default: ""
      sarif_files:
        description: Comma-separated list of SARIF files to include as evidence
        default: ""
      olm_catalog:
        description: OLM catalog hostname
        default: ""
      olm_org:
        description: OLM organization name
        default: ""
      olm_version:
        description: Version of OLM CLI to install
        # renovate: datasource=github-releases depName=defenseunicorns/uds-dot-mil extractVersion=^olm-(?<version>.+)$
        default: 0.1.19
      github_token:
        description: GitHub token for GHCR authentication. Pass secrets.GITHUB_TOKEN in CI. Leave empty locally — the package is publicly accessible.
        default: ""
      zarf_path:
        description: Path to the directory containing zarf.yaml
        default: .
      architecture:
        description: Target architecture for the Zarf package
        default: amd64
      flavor:
        description: Flavor for the Zarf package build
        default: upstream
      test_directory:
        description: Path to the test directory to pass to olm vouch. Leave empty to skip.
        default: tests
      witness_version:
        description: Witness version (MAJOR.MINOR.PATCH, no v prefix)
        # renovate: datasource=github-releases depName=in-toto/witness extractVersion=^v(?<version>.+)$
        default: 0.9.2
      enable_sigstore:
        description: Sign the attestation with Sigstore/Fulcio. Requires OIDC token (e.g. GitHub Actions).
        default: "false"
      enable_archivista:
        description: Upload the attestation to Archivista.
        default: "false"
    actions:
      - description: Install tools, build Zarf package, and vouch
        shell:
          linux: bash
          darwin: bash
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          ATTESTATIONS=${{ .inputs.attestations }}
          SARIF_FILES=${{ .inputs.sarif_files }}
          TEST_DIRECTORY=${{ .inputs.test_directory }}

          uds run olm:setup \
            --with version="${{ .inputs.olm_version }}" \
            --with github_token="${{ .inputs.github_token }}"

          uds run build:zarf-package \
            --with zarf_path="${{ .inputs.zarf_path }}" \
            --with architecture="${{ .inputs.architecture }}" \
            --with flavor="${{ .inputs.flavor }}" \
            --with witness_version="${{ .inputs.witness_version }}" \
            --with enable_sigstore="${{ .inputs.enable_sigstore }}" \
            --with enable_archivista="${{ .inputs.enable_archivista }}"

          PACKAGE=$(find . -maxdepth 1 -name "zarf-package-*.tar.zst" -type f | head -n 1)

          ALL_ATTESTATIONS="zarf-create-witness.json"
          if [ -n "$ATTESTATIONS" ]; then
            ALL_ATTESTATIONS="${ALL_ATTESTATIONS},$ATTESTATIONS"
          fi

          OLM_ARGS=()
          if [ -n "$SARIF_FILES" ]; then
            OLM_ARGS+=(--sarif-evidence "$SARIF_FILES")
          fi
          if [ -n "$TEST_DIRECTORY" ] && [ -d "$TEST_DIRECTORY" ]; then
            OLM_ARGS+=(--test-directory "$TEST_DIRECTORY")
          fi

          ./olm vouch "$PACKAGE" \
            --cat "${{ .inputs.olm_catalog }}" \
            --org "${{ .inputs.olm_org }}" \
            "${OLM_ARGS[@]}" \
            --log-level debug \
            --attestations "${ALL_ATTESTATIONS}"
