name: Vouch
description: Builds a Zarf package with Witness attestation and vouches for it via OLM.

inputs:
  attestations:
    description: Comma-separated list of witness JSON attestation files to include (e.g. outputs from security-scan plus any external lint/test attestations)
    required: false
    default: ""
  sarif-files:
    description: Comma-separated list of SARIF files to include as evidence (e.g. outputs from security-scan plus any external SARIF files)
    required: false
    default: ""
  olm-catalog:
    description: OLM catalog hostname
    required: true
  olm-org:
    description: OLM organization name
    required: true
  olm-user-id:
    description: OLM registry username
    required: true
  olm-password:
    description: OLM registry password
    required: true
  zarf-architecture:
    description: Target architecture for the Zarf package
    required: false
    default: amd64
  zarf-flavor:
    description: Flavor for the Zarf package build
    required: false
    default: upstream
  zarf-path:
    description: Path to the directory containing zarf.yaml. Use a subdirectory path for monorepos (e.g. 'services/api').
    required: false
    default: .
  artifact-name:
    description: Name for the uploaded Zarf package artifact. Use unique names when building multiple packages in a matrix.
    required: false
    default: zarf-package
  test-directory:
    description: Path to the test directory to pass to olm vouch. Leave empty to skip the --test-directory flag entirely.
    required: false
    default: tests

outputs:
  zarf-package:
    description: Filename of the built Zarf package
    value: ${{ steps.find-package.outputs.zarf-package }}

runs:
  using: composite
  steps:

    - name: Install Cosign
      uses: sigstore/cosign-installer@v4.1.1

    - name: OLM CLI Setup
      uses: ./.github/actions/olm-cli-setup
      with:
        username: ${{ inputs.olm-user-id }}
        password: ${{ inputs.olm-password }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4.0.0

    - name: Witness Build Zarf Package
      uses: testifysec/witness-run-action@7aa15e327829f1f2a523365c564c948d5dde69dd # v0.3.3
      with:
        step: zarf-create
        enable-archivista: false
        enable-sigstore: true
        command: uds zarf package create ${{ inputs.zarf-path }} --confirm --no-progress --architecture="${{ inputs.zarf-architecture }}" --flavor "${{ inputs.zarf-flavor }}"
        outfile: zarf-create-witness.json

    - name: Find Zarf package
      id: find-package
      shell: bash
      run: |
        PACKAGE=$(ls zarf-package-*.tar.zst | head -n 1)
        echo "zarf-package=${PACKAGE}" >> "$GITHUB_OUTPUT"

    - name: Vouch for Zarf Package
      shell: bash
      env:
        OLM_CAT: ${{ inputs.olm-catalog }}
        OLM_ORG: ${{ inputs.olm-org }}
      run: |
        ALL_ATTESTATIONS="zarf-create-witness.json"
        if [[ -n "${{ inputs.attestations }}" ]]; then
          ALL_ATTESTATIONS="${ALL_ATTESTATIONS},${{ inputs.attestations }}"
        fi

        TEST_DIR_FLAG=""
        if [[ -n "${{ inputs.test-directory }}" && -d "${{ inputs.test-directory }}" ]]; then
          TEST_DIR_FLAG="--test-directory ${{ inputs.test-directory }}"
        fi

        SARIF_FLAG=""
        if [[ -n "${{ inputs.sarif-files }}" ]]; then
          SARIF_FLAG="--sarif-evidence ${{ inputs.sarif-files }}"
        fi

        ./olm vouch ${{ steps.find-package.outputs.zarf-package }} \
          --cat "$OLM_CAT" \
          --org "$OLM_ORG" \
          $SARIF_FLAG \
          --log-level debug \
          $TEST_DIR_FLAG \
          --attestations ${ALL_ATTESTATIONS}

    - name: Upload Zarf package artifact
      uses: actions/upload-artifact@v7.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: zarf-package-*.tar.zst
