name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:

      - name: Checkout code
        uses: actions/checkout@v6.0.2
      # TODO: Replace <pin-sha-here> with the SHA from CHANGELOG.md after release.

      - name: UDS CLI Setup
        uses: defenseunicorns-udm/actions/uds-cli-setup@<pin-sha-here>

      # Lint logic is owned by the calling repo via a UDS task.
      # Define a 'lint' task in your tasks.yaml that runs your linter(s).
      - name: Witness Run Lint
        uses: testifysec/witness-run-action@7aa15e327829f1f2a523365c564c948d5dde69dd # v0.3.3
        with:
          step: lint
          enable-archivista: false
          enable-sigstore: true
          command: uds run lint:all
          outfile: lint-witness.json

      - name: Upload lint artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: lint-artifacts
          path: lint-witness.json

  scan-and-vouch:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: UDS CLI Setup
        uses: defenseunicorns-udm/actions/uds-cli-setup@<pin-sha-here>

      - name: Download lint artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: lint-artifacts
          path: .

      - name: Security Scan
        id: scan
        uses: defenseunicorns-udm/actions/security-scan@<pin-sha-here>

      - name: Vouch
        uses: defenseunicorns-udm/actions/vouch@<pin-sha-here>
        with:
          attestations: ${{ steps.scan.outputs.witness-files }},lint-witness.json
          sarif-files: ${{ steps.scan.outputs.sarif-files }}
          olm-catalog: cat-api.uds-mil.us
          olm-org: uds-army-demo
          olm-user-id: ${{ secrets.OLM_USER_ID }}
          olm-password: ${{ secrets.OLM_PASSWORD }}

  publish:
    needs: scan-and-vouch
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: UDS CLI Setup
        uses: defenseunicorns-udm/actions/uds-cli-setup@<pin-sha-here>

      - name: Publish
        uses: defenseunicorns-udm/actions/publish@<pin-sha-here>
        with:
          registry: registry.uds-mil.us
          registry-org: uds-army-demo
          registry-user-id: ${{ secrets.DEMO_ORG_USER_ID }}
          registry-password: ${{ secrets.DEMO_ORG_PASSWORD }}
