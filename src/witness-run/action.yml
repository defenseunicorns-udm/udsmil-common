name: Witness Run
description: Run a command with Witness attestation

inputs:
  witness-install-dir:
    description: Directory to install witness in. The directory will be created if it does not exist.
    required: false
  archivista-server:
    description: URL of the Archivista server to store or retrieve attestations
    required: false
    default: "https://archivista.testifysec.io"
  archivista-headers:
    description: Headers to include when making requests to Archivista. Newline-separated.
    required: false
    default: ""
  attestations:
    description: Space-separated list of attestations to record
    required: false
    default: "environment git github"
  attestor-link-export:
    description: Export the attestor link predicate in its own attestation
    required: false
    default: "false"
  attestor-maven-pom-path:
    description: Path to the Maven POM file
    required: false
  attestor-sbom-export:
    description: Export the SBOM predicate in its own attestation
    required: false
    default: "false"
  attestor-slsa-export:
    description: Export the SLSA predicate in its own attestation
    required: false
    default: "false"
  certificate:
    description: Path to the signing key certificate
    required: false
  command:
    description: Command to run under witness attestation
    required: true
  enable-archivista:
    description: Use Archivista to store or retrieve attestations
    required: false
    default: "true"
  enable-sigstore:
    description: Use Sigstore for attestation signing
    required: false
    default: "true"
  fulcio:
    description: Fulcio address to sign with
    required: false
  fulcio-oidc-client-id:
    description: OIDC client ID to use for Fulcio authentication
    required: false
  fulcio-oidc-issuer:
    description: OIDC issuer to use for Fulcio authentication
    required: false
  fulcio-token:
    description: Raw token to use for Fulcio authentication
    required: false
  intermediates:
    description: Space-separated intermediate certificates that link trust back to a root of trust in the policy
    required: false
  key:
    description: Path to the signing key
    required: false
  outfile:
    description: File to write signed attestation data to. Defaults to a temp file named after the step.
    required: false
  product-exclude-glob:
    description: Pattern for files to exclude as subjects on the attestation
    required: false
  product-include-glob:
    description: Pattern for files to include as subjects on the attestation
    required: false
  spiffe-socket:
    description: Path to the SPIFFE Workload API socket
    required: false
  step:
    description: Name of the step being attested
    required: true
  timestamp-servers:
    description: Space-separated Timestamp Authority server URLs to use when signing
    required: false
  trace:
    description: Enable tracing for the command
    required: false
    default: "false"
  cosign-certificate-identity:
    description: >
      Expected Sigstore certificate identity URI for the witness release signing workflow.
      Defaults to the official in-toto/witness release workflow URI for the configured version.
    required: false
    default: ""
  cosign-certificate-oidc-issuer:
    description: Expected OIDC issuer for the witness release signing certificate.
    required: false
    default: "https://token.actions.githubusercontent.com"
  version:
    description: Version of the Witness CLI to install (MAJOR.MINOR.PATCH, no v prefix)
    required: false
    default: "0.9.2"
  workingdir:
    description: Directory from which the attested command will run (relative to GITHUB_WORKSPACE)
    required: false
    default: ""

outputs:
  git_oid:
    description: >
      Comma-separated list of GitOIDs stored in Archivista for this step's attestation.
      In the common case of a single attestation this is a single 64-character hex string.

runs:
  using: node24
  main: dist/index.js
